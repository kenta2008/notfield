<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>Notfield</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="screen">
        <div id="setup-screen" class="setup">
            <h1>参加するプレイヤーを選択してください</h1>
            <div class="buttons">
                <button onclick="choosePlayer('player1')" class="selectbutton1">ユーザー1</button>
            </div>
            <div class="buttons2">
                <button onclick="choosePlayer('player2')" class="selectbutton2">ユーザー2</button>
            </div>
            <div class="buttons3">
                <button type="button" id="credit-open" class="credit-open-button">クレジット</button>
            </div>
            <div id="name-setup" class="name-setup" style="display: none;">
                <p id="name-setup-label">名前を入力してください</p>
                <input id="player-name-input" type="text" maxlength="8" autocomplete="off" placeholder="名前">
                <button type="button" onclick="confirmPlayerName()" class="name-start-button">決定</button>
            </div>
        </div>
        <div id="credit-popup" class="credit-popup" aria-hidden="true">
            <section class="credit-panel" role="dialog" aria-modal="true" aria-labelledby="credit-title">
                <header class="credit-top-bar">
                    <span aria-hidden="true"></span>
                    <h2 id="credit-title">クレジット</h2>
                    <button type="button" id="credit-close" class="credit-close-button" aria-label="クレジットを閉じる">閉じる</button>
                </header>
                <div class="credit-content">
                    <h3>NOT FIELD</h3>
                    <dl class="credit-list">
                        <div><dt>企画・制作</dt><dd>けんた<br>そら<br>ひろと</dd></div>
                        <div><dt>ゲームデザイン</dt><dd>ひろと</dd></div>
                        <div><dt>プログラム</dt><dd>けんた<br>そら</dd></div>
                        <div><dt>画像・音源素材</dt><dd><a href="https://soundeffect-lab.info/" target="_blank" rel="noopener noreferrer">効果音ラボ</a></dd></div>
                    </dl>
                </div>
                <footer class="credit-bottom-bar">　　</footer>
            </section>
        </div>
        <div class="gameoya" style="display: none;">
            <div id="game-screen" style="display: none;">
                <div class="game-top-bar">
                    <button type="button" class="top-menu-button training-button"><span class="top-menu-icon">&larr;</span><span>&#20462;&#34892;</span></button>
                    <div id="round-label" class="round-label">ラウンド:1</div>
                    <button type="button" class="top-menu-button book-button"><span class="book-icon" aria-hidden="true"></span><span>カード紹介</span></button>
                </div>
                <div id="victory-screen" class="victory-screen" style="display: none;">
                    <div class="victory-panel">
                        <div class="victory-kicker">RESULT</div>
                        <h2 id="victory-title">player1 WIN</h2>
                        <p id="victory-message">勝利しました</p>
                        <button type="button" onclick="resetGame()" class="victory-reset-button">戦いを終わる</button>
                    </div>
                </div>
                <div id="tutorial-overlay" class="tutorial-overlay" aria-hidden="true">
                    <div id="tutorial-spotlight" class="tutorial-spotlight" aria-hidden="true"></div>
                </div>
                <section id="tutorial-panel" class="tutorial-panel" aria-hidden="true" aria-live="polite">
                    <div id="tutorial-step-label" class="tutorial-step-label">1 / 4</div>
                    <h2 id="tutorial-title">カードを選ぶ</h2>
                    <p id="tutorial-message">手札から使いたいカードを1枚押します。</p>
                    <div class="tutorial-actions">
                        <button type="button" id="tutorial-ok" class="tutorial-next-button">OK</button>
                        <button type="button" id="tutorial-skip" class="tutorial-skip-button">すべてスキップ</button>
                    </div>
                    <div class="tutorial-timebar" aria-hidden="true">
                        <div id="tutorial-timebar-fill" class="tutorial-timebar-fill"></div>
                    </div>
                </section>
                <div id="card-book-popup" class="card-book-popup" aria-hidden="true">
                    <div class="card-book-panel" role="dialog" aria-modal="true" aria-label="カード紹介">
                        <div class="card-book-top-bar">
                            <div class="card-book-top-spacer" aria-hidden="true"></div>
                            <div class="card-book-title-pill">カード紹介</div>
                            <button type="button" id="card-book-close" class="top-menu-button card-book-close-button" aria-label="カード紹介を閉じる"><span class="book-icon" aria-hidden="true"></span><span>カード紹介閉じる</span></button>
                        </div>
                        <div class="card-book-layout">
                            <aside class="card-book-sidebar" aria-label="カードフィルター">
                                <button class="card-book-filter is-active" type="button" data-filter="all">すべて</button>
                                <button class="card-book-filter" type="button" data-filter="attack">攻撃</button>
                                <button class="card-book-filter" type="button" data-filter="defense">守備</button>
                                <button class="card-book-filter" type="button" data-filter="heal">回復</button>
                                <button class="card-book-filter" type="button" data-filter="magic">魔法</button>
                                <button class="card-book-filter" type="button" data-filter="element-machine">機械</button>
                                <button class="card-book-filter" type="button" data-filter="element-material">物質</button>
                            </aside>
                            <section class="card-book-play-area" aria-label="カード一覧">
                                <div id="card-book-container" class="card-book-container"></div>
                            </section>
                        </div>
                        <div class="card-book-bottom-bar">
                            <div id="card-book-bottom-player-name" class="card-book-bottom-player-name">player1</div>
                            <div class="volume-control" aria-label="音量">
                                <span class="volume-icon" aria-hidden="true"></span>
                                <div class="volume-meter" role="group" aria-label="音量調節">
                                    <button type="button" class="volume-step" data-volume="10" aria-label="音量 10%"></button>
                                    <button type="button" class="volume-step" data-volume="20" aria-label="音量 20%"></button>
                                    <button type="button" class="volume-step" data-volume="30" aria-label="音量 30%"></button>
                                    <button type="button" class="volume-step" data-volume="40" aria-label="音量 40%"></button>
                                    <button type="button" class="volume-step" data-volume="50" aria-label="音量 50%"></button>
                                    <button type="button" class="volume-step" data-volume="60" aria-label="音量 60%"></button>
                                    <button type="button" class="volume-step" data-volume="70" aria-label="音量 70%"></button>
                                    <button type="button" class="volume-step" data-volume="80" aria-label="音量 80%"></button>
                                    <button type="button" class="volume-step" data-volume="90" aria-label="音量 90%"></button>
                                    <button type="button" class="volume-step" data-volume="100" aria-label="音量 100%"></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="select">
                    <div class="player1">
                        <h3 id="player1-name-title">player1</h3>
                        <div id="battle-log-player1" class="battle-log"></div>
                    </div>
                    <div id="attack-arrow" class="attack-arrow">&rarr;</div>
                    <div class="player2">
                        <h3 id="player2-name-title">player2</h3>
                        <div id="battle-log-player2" class="battle-log"></div>
                    </div>
                    <div class="hparea">
                        <div class="status status1"><p id="player1-status-name">player1</p><span class="status-resource"><span class="status-resource-label">HP</span><span id="myhp">50</span></span><span class="status-resource"><span class="status-resource-label">MP</span><span id="player1-mp">20</span></span></div>
                        <div class="status status2"><p id="player2-status-name">player2</p><span class="status-resource"><span class="status-resource-label">HP</span><span id="tekihp">50</span></span><span class="status-resource"><span class="status-resource-label">MP</span><span id="player2-mp">20</span></span></div>
                    </div>
                </div>
                <div id="timer-bar-wrap">
                    <div id="timer-bar"></div>
                </div>
                <div id="my-screen" class="screen-area">
                    <div id="my-hand" class="hand-area"></div>
                    <div id="my-magic-hand" class="magic-hand-area"></div>
                </div>
                <div id="enemy-screen" class="screen-area">
                    <div id="teki-hand" class="hand-area"></div>
                    <div id="teki-magic-hand" class="magic-hand-area"></div>
                </div>
                <div class="game-bottom-bar">
                    <div id="bottom-player-name" class="bottom-player-name">player1</div>
                    <div class="volume-control" aria-label="音量">
                        <span class="volume-icon" aria-hidden="true"></span>
                        <div id="volume-meter" class="volume-meter" role="group" aria-label="音量調節">
                            <button type="button" class="volume-step" data-volume="10" aria-label="音量 10%"></button>
                            <button type="button" class="volume-step" data-volume="20" aria-label="音量 20%"></button>
                            <button type="button" class="volume-step" data-volume="30" aria-label="音量 30%"></button>
                            <button type="button" class="volume-step" data-volume="40" aria-label="音量 40%"></button>
                            <button type="button" class="volume-step" data-volume="50" aria-label="音量 50%"></button>
                            <button type="button" class="volume-step" data-volume="60" aria-label="音量 60%"></button>
                            <button type="button" class="volume-step" data-volume="70" aria-label="音量 70%"></button>
                            <button type="button" class="volume-step" data-volume="80" aria-label="音量 80%"></button>
                            <button type="button" class="volume-step" data-volume="90" aria-label="音量 90%"></button>
                            <button type="button" class="volume-step" data-volume="100" aria-label="音量 100%"></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <p>テスト用</p>
    <button onclick="resetGame()" style="padding: 5px 10px; cursor: pointer; font-weight: bold;">強制リセット</button>
    <script type="module" src="script.js"></script>
</body>
</html>
